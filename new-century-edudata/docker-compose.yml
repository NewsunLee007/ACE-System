version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: new-century-db
    environment:
      MYSQL_ROOT_PASSWORD: NewCentury2025!
      MYSQL_DATABASE: new_century_edudata
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/new_century_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: new-century-backend
    environment:
      DATABASE_URL: mysql+pymysql://root:NewCentury2025!@db:3306/new_century_edudata?charset=utf8mb4
      APP_ENV: production
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4

  frontend:
    image: nginx:alpine
    container_name: new-century-frontend
    volumes:
      - ./frontend/build:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
